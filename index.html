<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#a93127" />
    <title>墨境图像工作台启动页</title>
    <link rel="manifest" href="./manifest.webmanifest?v=20260503-iconfix2" />
    <link rel="icon" href="./public/assets/icon-192.png?v=20260503-iconfix2" type="image/png" />
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f7efe0;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(255, 250, 240, 0.92), rgba(247, 239, 224, 0.94)),
          url("./public/assets/mojing-ink-hero.png") top center / 100% 380px no-repeat;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        border: 1px solid #e2d5bd;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.92);
        padding: 18px;
        box-shadow: 0 16px 40px rgba(54, 43, 28, 0.1);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .brand img {
        width: 42px;
        height: 42px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }

      p {
        margin: 0 0 12px;
        color: #475569;
        line-height: 1.6;
      }

      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: #f7efe0;
      }

      button {
        min-height: 36px;
        border: 0;
        border-radius: 8px;
        padding: 0 14px;
        background: #a93127;
        color: #fffaf0;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="./public/assets/icon-192.png?v=20260503-iconfix2" alt="" aria-hidden="true" />
        <h1>墨境图像工作台</h1>
      </div>
      <p id="message">正在检查本机服务。</p>
      <p>如果没有自动打开，请双击 <code>启动图片生成工作台.command</code>。</p>
      <button id="retryBtn" type="button">重新检查</button>
    </main>
    <script>
      const message = document.getElementById("message");
      const retryBtn = document.getElementById("retryBtn");
      retryBtn.addEventListener("click", check);
      check();

      async function check() {
        message.textContent = "正在检查本机服务。";
        try {
          const response = await fetch("http://127.0.0.1:9999/api/health", { headers: { Accept: "application/json" } });
          const json = await response.json();
          if (!response.ok || json.ok === false) throw new Error("not ready");
          message.textContent = "服务已就绪，正在打开工作台。";
          window.location.href = "http://127.0.0.1:9999/";
        } catch {
          message.textContent = "服务未启动。请双击启动脚本后再打开。";
        }
      }
    </script>
  </body>
</html>
